<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aarav Elite | Pro Suite</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  body { background: #f8fafc; font-family: -apple-system, sans-serif; padding-bottom: 100px; }
  .glass { background: white; border-radius: 16px; padding: 16px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  .nav-active { color: #2563eb !important; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  #readerView { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
</style>
</head>

<body class="p-4">

<div id="login-screen" class="fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm space-y-6 text-center">
    <h1 class="text-3xl font-black text-slate-900">Aarav Elite</h1>
    <button onclick="login()" class="w-full bg-white border py-3 rounded-xl font-bold flex items-center justify-center gap-3">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Login with Google
    </button>
  </div>
</div>

<div id="app" class="space-y-4 hidden">
  <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
    <div>
        <p class="text-[10px] font-bold text-gray-400">WELCOME</p>
        <p id="user-display" class="font-bold text-slate-800 text-sm">--</p>
    </div>
    <button onclick="logout()" class="text-red-500 text-xs font-bold">LOGOUT</button>
  </div>

  <div id="tab-library" class="tab-content active space-y-4">
    <div class="glass">
      <h3 class="font-bold text-sm mb-3">📚 Elite Library</h3>
      <div id="bookGrid" class="space-y-2"></div>
    </div>
  </div>

  <div id="tab-ai" class="tab-content space-y-4">
    <div class="glass">
      <h3 class="font-bold text-sm mb-3">🤖 AI Tutor</h3>
      <textarea id="aiQ" class="w-full p-3 rounded-xl border text-sm h-32" placeholder="Ask anything..."></textarea>
      <button onclick="askAI()" id="aiBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mt-2">Get Answer</button>
      <div id="aiResponse" class="mt-4 text-xs text-gray-700 whitespace-pre-wrap"></div>
    </div>
  </div>

  <div id="tab-home" class="tab-content space-y-4">
    
    <div id="erp-locked" class="glass text-center py-12 space-y-4 hidden">
        <div class="text-5xl">🔒</div>
        <h2 class="text-xl font-bold">Premium Required</h2>
        <p class="text-gray-500 text-sm px-6">Expense Tracker and Reports are available for subscribed members only.</p>
        <button onclick="window.open('https://wa.me/91XXXXXXXXXX')" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">Contact Admin to Buy</button>
    </div>

    <div id="erp-unlocked" class="space-y-4 hidden">
        <div class="bg-slate-900 rounded-3xl p-6 text-white shadow-xl">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Net Balance</p>
            <h2 id="balance" class="text-3xl font-black">₹0</h2>
        </div>

        <div class="glass">
            <form id="transactionForm" class="space-y-3">
                <div class="flex p-1 bg-gray-100 rounded-xl">
                    <label class="flex-1 text-center py-2 rounded-lg cursor-pointer text-xs font-bold has-[:checked]:bg-white has-[:checked]:text-green-600">
                        <input type="radio" name="type" value="income" class="hidden" checked> Income
                    </label>
                    <label class="flex-1 text-center py-2 rounded-lg cursor-pointer text-xs font-bold has-[:checked]:bg-white has-[:checked]:text-red-600">
                        <input type="radio" name="type" value="expense" class="hidden"> Expense
                    </label>
                </div>
                <input id="amount" type="number" class="w-full p-3 rounded-xl border bg-gray-50 font-bold" placeholder="₹ Amount" required>
                <input id="description" class="w-full p-3 rounded-xl border bg-gray-50 text-sm" placeholder="Description" required>
                <div class="grid grid-cols-2 gap-2">
                    <select id="categorySelect" class="p-3 rounded-xl border bg-gray-50 text-xs"></select>
                    <input id="date" type="date" class="p-3 rounded-xl border bg-gray-50 text-xs">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Save Entry</button>
            </form>
        </div>
    </div>
  </div>

  <div id="tab-reports" class="tab-content space-y-4">
      <div id="reports-locked" class="glass text-center py-10 font-bold text-gray-400">Locked Section</div>
      <div id="reports-unlocked" class="space-y-4 hidden">
          <div class="glass"><canvas id="expenseChart"></canvas></div>
          <div class="glass table-scroll">
              <table class="w-full text-[11px] text-left">
                  <thead><tr><th class="p-2">Period</th><th class="p-2">In</th><th class="p-2">Out</th><th class="p-2">Closing</th></tr></thead>
                  <tbody id="reportTableBody"></tbody>
              </table>
          </div>
      </div>
  </div>

  <div id="tab-admin" class="tab-content space-y-4">
    <div class="glass">
      <h3 class="font-bold text-sm mb-3">User Activation Panel</h3>
      <div id="userList" class="space-y-3"></div>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 pb-6 z-50">
    <button onclick="switchTab('library')" class="nav-btn flex flex-col items-center text-[10px] font-bold text-gray-400 nav-active" id="btn-library"><span class="text-xl">📚</span><span>LIBRARY</span></button>
    <button onclick="switchTab('ai')" class="nav-btn flex flex-col items-center text-[10px] font-bold text-gray-400" id="btn-ai"><span class="text-xl">🤖</span><span>AI</span></button>
    <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center text-[10px] font-bold text-gray-400" id="btn-home"><span class="text-xl">📊</span><span>ERP</span></button>
    <button onclick="switchTab('reports')" class="nav-btn flex flex-col items-center text-[10px] font-bold text-gray-400" id="btn-reports"><span class="text-xl">📈</span><span>STATS</span></button>
    <button onclick="switchTab('admin')" class="nav-btn flex flex-col items-center text-[10px] font-bold text-gray-400 hidden" id="btn-admin"><span class="text-xl">🔑</span><span>ADMIN</span></button>
  </nav>

</div>

<div id="readerView">
    <button onclick="closeReader()" class="fixed top-4 right-4 bg-red-600 text-white px-4 py-2 rounded-lg font-bold">CLOSE</button>
    <iframe id="bookFrame" class="w-full h-full"></iframe>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const fbCfg = { apiKey: "AIzaSyCrFbBhfWT6WlYAH_ZmopTfzrf47GEQe1k", authDomain: "book-swap-104b7.firebaseapp.com", projectId: "book-swap-104b7" };
const fbApp = initializeApp(fbCfg);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const prov = new GoogleAuthProvider();

let transactions = [];
let categories = ["Salary", "Food", "Rent", "Business"];
let prefix = "";
const adminEmail = "mihirjaisingh@gmail.com";

// --- AUTH & SUBSCRIPTION CHECK ---
onAuthStateChanged(auth, async user => {
    if (user) {
        prefix = user.email.replace(/[^a-zA-Z0-9]/g, "") + "_";
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("user-display").textContent = user.displayName;
        
        // Show Admin tab if it's you
        if(user.email === adminEmail) document.getElementById("btn-admin").classList.remove("hidden");

        // Create User Doc if not exists
        await setDoc(doc(db, "users", user.uid), { name: user.displayName, email: user.email }, { merge: true });

        // Load Library
        loadLibrary();
        checkSubscription(user.uid);
    } else {
        document.getElementById("login-screen").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
    }
});

async function checkSubscription(uid) {
    const snap = await getDoc(doc(db, "users", uid));
    const data = snap.data();
    const expiry = data.erpExpiry ? (data.erpExpiry.toDate ? data.erpExpiry.toDate() : new Date(data.erpExpiry)) : null;

    if(expiry && expiry > new Date()) {
        // UNLOCKED
        document.getElementById("erp-unlocked").classList.remove("hidden");
        document.getElementById("reports-unlocked").classList.remove("hidden");
        document.getElementById("erp-locked").classList.add("hidden");
        document.getElementById("reports-locked").classList.add("hidden");
        
        transactions = JSON.parse(localStorage.getItem(prefix + "tx")) || [];
        renderCategories();
        updateDashboard();
    } else {
        // LOCKED
        document.getElementById("erp-locked").classList.remove("hidden");
        document.getElementById("reports-locked").classList.remove("hidden");
    }
}

window.login = () => signInWithPopup(auth, prov);
window.logout = () => signOut(auth).then(() => location.reload());

window.switchTab = (t) => {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('btn-'+t).classList.add('nav-active');
    if(t === 'reports') renderReports();
    if(t === 'admin') loadUsers();
};

// --- ERP CORE (ONLY RUNS IF UNLOCKED) ---
document.getElementById("transactionForm").onsubmit = (e) => {
    e.preventDefault();
    transactions.push({
        amount: +document.getElementById("amount").value,
        description: document.getElementById("description").value,
        category: document.getElementById("categorySelect").value,
        date: document.getElementById("date").value || new Date().toISOString().split('T')[0],
        type: document.querySelector('input[name="type"]:checked').value
    });
    localStorage.setItem(prefix + "tx", JSON.stringify(transactions));
    e.target.reset();
    updateDashboard();
};

function updateDashboard() {
    let bal = 0;
    transactions.forEach(t => bal += (t.type === 'income' ? t.amount : -t.amount));
    document.getElementById("balance").textContent = "₹" + bal;
}

// --- ADMIN CONTROL ---
function loadUsers() {
    onSnapshot(collection(db, "users"), snap => {
        const list = document.getElementById("userList");
        list.innerHTML = "";
        snap.forEach(uDoc => {
            const u = uDoc.data();
            const card = document.createElement('div');
            card.className = "bg-gray-50 p-3 rounded-xl border flex justify-between items-center";
            card.innerHTML = `<div><p class="font-bold text-xs">${u.name}</p><p class="text-[10px] text-gray-500">${u.email}</p></div>
                             <button onclick="activateUser('${uDoc.id}')" class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded">Activate</button>`;
            list.appendChild(card);
        });
    });
}
window.activateUser = async (uid) => {
    const exp = new Date(); exp.setDate(exp.getDate() + 30);
    await updateDoc(doc(db, "users", uid), { erpExpiry: Timestamp.fromDate(exp) });
    alert("User Activated for 30 Days!");
};

// --- LIBRARY & AI ---
function loadLibrary() {
    onSnapshot(collection(db, "secure_ebooks"), snap => {
        const grid = document.getElementById("bookGrid"); grid.innerHTML = "";
        snap.forEach(doc => {
            const b = doc.data();
            const d = document.createElement('div');
            d.className = "flex justify-between items-center bg-gray-50 p-3 rounded-xl border";
            d.innerHTML = `<span class="font-bold text-xs">${b.title}</span><button class="bg-slate-900 text-white px-3 py-1 rounded text-xs">Read</button>`;
            d.onclick = () => { document.getElementById('bookFrame').src = b.link.replace('/view', '/preview'); document.getElementById('readerView').style.display = 'block'; };
            grid.appendChild(d);
        });
    });
}

window.askAI = async () => {
    const q = document.getElementById("aiQ").value; if(!q) return;
    document.getElementById("aiBtn").innerText = "Thinking...";
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer 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", "Content-Type": "application/json" },
        body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role: "user", content: q}] })
    });
    const d = await res.json();
    document.getElementById("aiResponse").innerText = d.choices[0].message.content;
    document.getElementById("aiBtn").innerText = "Get Answer";
};

// Helpers
window.renderCategories = () => {
    const sel = document.getElementById("categorySelect"); sel.innerHTML = "";
    categories.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
};
window.closeReader = () => { document.getElementById('readerView').style.display = 'none'; document.getElementById('bookFrame').src = ''; };
</script>
</body>
</html>
