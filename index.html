<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AARRV ELITE | Smart Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --p: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --glass: rgba(255, 255, 255, 0.7); }
        body.dark-mode { --bg: #020617; --card: #1e293b; --text: #f1f5f9; --glass: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.4s; padding-bottom: 100px; }

        .header { position: sticky; top: 0; backdrop-filter: blur(12px); background: var(--glass); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-weight: 800; font-size: 1.3rem; color: var(--p); }

        .container { max-width: 500px; margin: 10px auto; padding: 0 15px; display: none; }
        
        /* Logout Button Header */
        .logout-chip { background: var(--card); padding: 5px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; color: #dc3545; border: 1px solid rgba(220, 53, 69, 0.2); cursor: pointer; transition: 0.3s; }
        .logout-chip:hover { background: #dc3545; color: white; }

        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .cat-chip { background: var(--card); padding: 8px 18px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        .cat-chip.active { background: var(--p); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .book-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; border: 1px solid rgba(0,0,0,0.03); }
        .badge { position: absolute; top: 0; right: 0; background: var(--p); color: white; padding: 5px 12px; border-bottom-left-radius: 15px; font-size: 0.7rem; font-weight: bold; }
        
        input, textarea, .btn-main { width: 100%; padding: 15px; margin: 8px 0; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: var(--card); color: var(--text); font-family: inherit; box-sizing: border-box; }
        .btn-main { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; font-weight: 700; border: none; cursor: pointer; }

        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; border: 1px solid rgba(255,255,255,0.2); }
        .nav-item { color: #94a3b8; font-size: 1.4rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--p); transform: translateY(-3px); }
        .nav-item span { font-size: 0.65rem; font-weight: bold; margin-top: 4px; }

        #readerView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; }
        #aiResponse { margin-top:15px; font-size:0.95rem; line-height:1.6; white-space:pre-wrap; background: rgba(99, 102, 241, 0.05); padding: 15px; border-radius: 15px; border-left: 4px solid var(--p); }
    </style>
</head>
<body id="body">

<div class="header">
    <div class="logo">AARRV ELITE</div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <i class="fas fa-adjust" onclick="toggleTheme()" style="cursor:pointer;"></i>
        <div id="userInfo" style="display: none; align-items: center; gap: 8px;">
            <span id="userName" style="font-size: 0.8rem; font-weight: bold;"></span>
            <div class="logout-chip" onclick="logoutApp()">LOGOUT</div>
        </div>
        <div id="authBtn" onclick="login()" style="font-size: 0.8rem; font-weight: bold; color: var(--p); cursor:pointer;">Login</div>
    </div>
</div>

<div id="loginSection" style="text-align: center; padding: 120px 20px;">
    <div style="font-size: 4rem; margin-bottom: 10px;">📚</div>
    <h2>AARRV TECH HUB</h2>
    <p style="opacity: 0.6;">Sign in to access your library.</p>
    <button class="btn-main" onclick="login()"><i class="fab fa-google"></i> Login with Google</button>
</div>

<div class="container" id="mainContainer">
    <div id="libSection">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search books..." oninput="filterBooks()" style="margin:0;">
        </div>
        
        <div class="category-scroll">
            <div class="cat-chip active" onclick="setCategory('ALL', this)">All</div>
            <div class="cat-chip" onclick="setCategory('Notes', this)">Notes</div>
            <div class="cat-chip" onclick="setCategory('Books', this)">Books</div>
            <div class="cat-chip" onclick="setCategory('PYQs', this)">PYQs</div>
        </div>

        <div id="adminPanel" style="display:none;" class="book-card">
            <h3>🛠️ Admin Publisher</h3>
            <input type="hidden" id="editId">
            <input type="text" id="title" placeholder="Book Title">
            <textarea id="desc" placeholder="Description"></textarea>
            <input type="text" id="link" placeholder="Drive Preview Link">
            <div style="display:flex; gap:10px;">
                <input type="text" id="price" placeholder="Price">
                <input type="text" id="wa" placeholder="WA Number">
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="cat" placeholder="Category (Notes/Books/PYQs)">
                <input type="text" id="authID" placeholder="Access (ALL/ID)">
            </div>
            <button class="btn-main" onclick="saveData()">Save Content</button>
            <button onclick="logoutApp()" style="background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer; font-weight:bold;">Switch Account (Logout)</button>
        </div>

        <div id="bookGrid"></div>
    </div>

    <div id="aiSection" style="display:none;">
        <div class="book-card">
            <h3>🤖 AI Assistant</h3>
            <textarea id="aiQ" placeholder="Sawal pucho..."></textarea>
            <button class="btn-main" onclick="askAI()" id="aiBtn">Get Answer</button>
            <div id="aiResponse">Awaiting question...</div>
        </div>
    </div>
</div>

<div class="nav" id="bottomNav" style="display:none;">
    <div class="nav-item active" onclick="tab('lib', this)"><i class="fas fa-book-reader"></i><span>Library</span></div>
    <div class="nav-item" onclick="tab('ai', this)"><i class="fas fa-brain"></i><span>AI Tutor</span></div>
</div>

<div id="readerView">
    <button onclick="closeReader()" style="position:absolute; top:20px; right:20px; z-index:4000; background:red; color:white; border:none; padding:12px; border-radius:10px;">CLOSE</button>
    <iframe id="frame" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const cfg = { apiKey: "AIzaSyCrFbBhfWT6WlYAH_ZmopTfzrf47GEQe1k", authDomain: "book-swap-104b7.firebaseapp.com", projectId: "book-swap-104b7", storageBucket: "book-swap-104b7.firebasestorage.app", messagingSenderId: "259299080234", appId: "1:259299080234:web:56a031e02a70d39e37eb53" };
    const app = initializeApp(cfg);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const prov = new GoogleAuthProvider();
    const GROQ = "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";
    
    let allBooks = [];
    let currentCategory = "ALL";
    const myID = localStorage.getItem('my_id') || "STU" + Math.floor(1000+Math.random()*9000);
    localStorage.setItem('my_id', myID);

    window.toggleTheme = () => document.body.classList.toggle('dark-mode');
    window.logoutApp = () => { if(confirm("Bhai, logout karna hai?")) signOut(auth).then(()=>location.reload()); };

    window.tab = (t, el) => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('libSection').style.display = t === 'lib' ? 'block' : 'none';
        document.getElementById('aiSection').style.display = t === 'ai' ? 'block' : 'none';
    };

    onAuthStateChanged(auth, u => {
        if(u) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').innerText = u.displayName.split(' ')[0];
            if(u.email === "mihirjaisingh@gmail.com") document.getElementById('adminPanel').style.display = 'block';
            loadData();
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('bottomNav').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('authBtn').style.display = 'block';
        }
    });

    window.login = () => signInWithPopup(auth, prov);

    window.saveData = async () => {
        const id = document.getElementById('editId').value;
        const data = {
            title: document.getElementById('title').value,
            desc: document.getElementById('desc').value,
            link: document.getElementById('link').value,
            price: document.getElementById('price').value,
            wa: document.getElementById('wa').value,
            cat: document.getElementById('cat').value || "Books",
            authorized: document.getElementById('authID').value || "ALL",
            ts: serverTimestamp()
        };
        try {
            if(id) await updateDoc(doc(db, "secure_ebooks", id), data);
            else await addDoc(collection(db, "secure_ebooks"), data);
            resetForm(); alert("Success!");
        } catch(e) { console.error(e); }
    };

    window.resetForm = () => {
        document.getElementById('editId').value = "";
        document.querySelectorAll('#adminPanel input, #adminPanel textarea').forEach(i => i.value = "");
    };

    function loadData() {
        onSnapshot(query(collection(db, "secure_ebooks"), orderBy("ts", "desc")), snap => {
            allBooks = [];
            snap.forEach(s => allBooks.push({id: s.id, ...s.data()}));
            renderBooks(allBooks);
        });
    }

    function renderBooks(books) {
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = "";
        books.forEach(b => {
            const isAdmin = auth.currentUser?.email === "mihirjaisingh@gmail.com";
            const locked = !(b.authorized === "ALL" || b.authorized.includes(myID) || isAdmin);
            grid.innerHTML += `<div class="book-card">
                <div class="badge">${locked ? '🔒 LOCKED' : '🔓 OPEN'}</div>
                <h3>${b.title}</h3>
                <p style="font-size:0.8rem; opacity:0.7;">${b.desc || ''}</p>
                <div style="font-weight:bold; color:var(--p); margin-bottom:10px;">₹${b.price}</div>
                ${locked ? 
                    `<button class="btn-main" style="background:#22c55e" onclick="window.open('https://wa.me/${b.wa}?text=Unlock%20${b.title}%20ID:${myID}')">Buy Access</button>` : 
                    `<button class="btn-main" onclick="read('${b.link}')">Start Reading</button>`}
                ${isAdmin ? `<div style="display:flex; gap:5px; margin-top:10px;">
                    <button onclick="editBook('${b.id}')" style="flex:1; background:#ffc107; border:none; padding:8px; border-radius:10px;">Edit</button>
                    <button onclick="deleteBook('${b.id}')" style="flex:1; background:#dc3545; color:white; border:none; padding:8px; border-radius:10px;">Del</button>
                </div>` : ''}
            </div>`;
        });
    }

    window.filterBooks = () => {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allBooks.filter(b => (currentCategory === "ALL" || b.cat === currentCategory) && b.title.toLowerCase().includes(q));
        renderBooks(filtered);
    };

    window.setCategory = (cat, el) => {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        currentCategory = cat; filterBooks();
    };

    window.editBook = (id) => {
        const b = allBooks.find(x => x.id === id);
        document.getElementById('editId').value = id;
        document.getElementById('title').value = b.title;
        document.getElementById('desc').value = b.desc;
        document.getElementById('link').value = b.link;
        document.getElementById('price').value = b.price;
        document.getElementById('wa').value = b.wa;
        document.getElementById('cat').value = b.cat;
        document.getElementById('authID').value = b.authorized;
        window.scrollTo(0,0);
    };

    window.deleteBook = async (id) => { if(confirm("Delete book?")) await deleteDoc(doc(db, "secure_ebooks", id)); };
    window.read = (url) => { document.getElementById('frame').src = url.replace('/view', '/preview'); document.getElementById('readerView').style.display = 'block'; };
    window.closeReader = () => { document.getElementById('readerView').style.display = 'none'; document.getElementById('frame').src = ""; };

    window.askAI = async () => {
        const q = document.getElementById('aiQ').value;
        const res = document.getElementById('aiResponse');
        if(!q) return;
        res.innerHTML = "Thinking...";
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${GROQ}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role: "user", content: q}] })
        });
        const data = await response.json();
        const txt = data.choices[0].message.content;
        let i = 0; res.innerHTML = "";
        function type() { if(i < txt.length) { res.innerHTML += txt.charAt(i); i++; setTimeout(type, 8); } }
        type();
    };
</script>
</body>
</html>
