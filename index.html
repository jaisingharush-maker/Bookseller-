<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Pro | WhatsApp Edition</title>
    <style>
        :root { --p: #007bff; --bg: #f8f9fa; --card: #ffffff; --g: #25d366; --y: #ffc107; --r: #dc3545; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; user-select: none; }
        .navbar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .nav-item { border: none; background: none; font-weight: 600; color: #aaa; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; }
        .nav-item.active { color: #007bff; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .book-card { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #ddd; }
        .btn-view { background: #007bff; color: white; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; border:none; width:100%; margin-top:10px; }
        .btn-wa { background: var(--g); color: white; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; border:none; width:100%; margin-top:8px; text-decoration: none; display: block; box-sizing: border-box; font-size: 0.9rem; }
        .btn-locked { background: #eee; color: #888; cursor: not-allowed; }
        .admin-btns { display: flex; gap: 5px; margin-top: 10px; border-top: 1px dashed #eee; padding-top: 10px; }
        .adm-btn { flex: 1; padding: 5px; border-radius: 5px; border: none; font-size: 0.7rem; cursor: pointer; font-weight: bold; }

        #secureViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--r); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; z-index: 2100; }

        input, .btn { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; border: none; font-weight: bold; }
        
        .chat-box { height: 250px; overflow-y: auto; background: #efe7dd; padding: 10px; border-radius: 15px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #ddd; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; }
        .msg.mine { align-self: flex-end; background: #dcf8c6; }
        .msg.others { align-self: flex-start; background: #fff; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="secureViewer">
    <button class="close-btn" onclick="closeViewer()">X</button>
    <iframe id="pdfFrame" src=""></iframe>
</div>

<div class="container">
    <div id="marketTab" class="tab-content active">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:#007bff">🛒 Store</h2>
            <span onclick="adminLogin()" id="adminIndicator" style="font-size: 0.7rem; color: #aaa; cursor:pointer;">Seller Login</span>
        </div>
        <div id="sellerForm" class="card" style="display:none; border: 2px solid #007bff;">
            <h4 id="formTitle">Post New E-Book</h4>
            <input type="hidden" id="editId">
            <input type="text" id="ebTitle" placeholder="Book Name">
            <input type="text" id="ebLink" placeholder="Google Drive Link">
            <input type="text" id="ebPrice" placeholder="Price (₹)">
            <input type="text" id="ebWa" placeholder="WhatsApp Number (With Country Code, e.g. 919876543210)">
            <input type="text" id="ebUser" placeholder="Access IDs (Comma separated) or ALL">
            <button class="btn" id="submitBtn" onclick="postEbook()">Publish Now</button>
            <button onclick="cancelEdit()" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:5px;">Cancel</button>
        </div>
        <div id="marketList"></div>
    </div>

    <div id="groupTab" class="tab-content">
        <h2 style="color:#007bff">💬 Chat</h2>
        <div class="card"><input type="text" id="roomIn" placeholder="Room ID" onchange="loadRoom()"><div id="cBox" class="chat-box"></div><div style="display:flex;gap:5px;margin-top:10px;"><input type="text" id="mIn" placeholder="Msg..."><button onclick="sendMsg()" class="btn" style="width:60px;margin:0">➤</button></div></div>
    </div>
    <div id="aiTab" class="tab-content">
        <h2 style="color:#28a745">🤖 AI Buddy</h2>
        <div class="card"><div id="aiBox" class="chat-box" style="height:200px"></div><input type="text" id="aiIn" placeholder="Ask AI..."><button onclick="askAI()" class="btn" style="background:#28a745">Ask AI</button></div>
    </div>
    <div id="studyTab" class="tab-content">
        <h2 style="color:#28a745">🧘 Focus</h2>
        <div id="focusLock" class="card" style="text-align:center;"><p>Enter PIN (1234)</p><input type="password" id="focusPin" style="text-align:center;"><button onclick="unlockFocus()" class="btn">Unlock</button></div>
        <div id="focusContent" style="display:none;">
            <div class="card" style="background:var(--dark); color:white; text-align:center;"><div id="tDisp" style="font-size:3rem; color:var(--y)">00:00</div><input type="number" id="tMin" style="width:70px; margin:10px auto; display:block;"><button onclick="startT()" class="btn" style="background:var(--g); width:45%">Start</button><button onclick="resetT()" class="btn" style="background:var(--r); width:45%">Reset</button></div>
            <div class="card"><h4>📝 Goals</h4><div style="display:flex; gap:5px;"><input type="text" id="todoIn" placeholder="New Goal..."><button onclick="addT()" class="btn" style="width:60px; margin:0;">+</button></div><div id="tList"></div></div>
        </div>
    </div>
</div>

<div class="navbar">
    <div class="nav-item active" onclick="tab('marketTab', this)"><span>🛒</span>Store</div>
    <div class="nav-item" onclick="tab('groupTab', this)"><span>💬</span>Chat</div>
    <div class="nav-item" onclick="tab('aiTab', this)"><span>🤖</span>AI</div>
    <div class="nav-item" onclick="tab('studyTab', this)"><span>🧘</span>Focus</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCrFbBhfWT6WlYAH_ZmopTfzrf47GEQe1k", 
        authDomain: "book-swap-104b7.firebaseapp.com", 
        projectId: "book-swap-104b7", 
        storageBucket: "book-swap-104b7.firebasestorage.app", 
        messagingSenderId: "259299080234", 
        appId: "1:259299080234:web:56a031e02a70d39e37eb53" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ebCol = collection(db, "secure_ebooks");
    const chatCol = collection(db, "group_messages");

    let isAdmin = false;
    const myID = localStorage.getItem('my_id') || "STU" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem('my_id', myID);

    window.tab = (id, el) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    };

    window.adminLogin = () => { if(prompt("Seller Password?") === "jaishree") { isAdmin = true; document.getElementById('sellerForm').style.display='block'; document.getElementById('adminIndicator').innerText="Admin Mode ✅"; loadBooks(); } };

    window.postEbook = async () => {
        const t = document.getElementById('ebTitle').value, l = document.getElementById('ebLink').value, a = document.getElementById('ebUser').value || "ALL", p = document.getElementById('ebPrice').value, w = document.getElementById('ebWa').value, id = document.getElementById('editId').value;
        if(id) await updateDoc(doc(db, "secure_ebooks", id), {title:t, link:l, authorized:a, price:p, whatsapp:w});
        else await addDoc(ebCol, {title:t, link:l, authorized:a, price:p, whatsapp:w, ts:serverTimestamp()});
        cancelEdit(); alert("Done!");
    };

    window.editBook = (id, t, l, a, p, w) => {
        document.getElementById('sellerForm').style.display='block';
        document.getElementById('editId').value = id;
        document.getElementById('ebTitle').value = t; document.getElementById('ebLink').value = l; document.getElementById('ebUser').value = a; document.getElementById('ebPrice').value = p; document.getElementById('ebWa').value = w || "";
        window.scrollTo(0,0);
    };

    window.deleteBook = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "secure_ebooks", id)); };
    window.cancelEdit = () => { document.getElementById('editId').value=""; document.getElementById('sellerForm').style.display='none'; };

    function loadBooks() {
        onSnapshot(query(ebCol, orderBy("ts", "desc")), snap => {
            document.getElementById('marketList').innerHTML = snap.docs.map(d => {
                const b = d.data(); const hasAccess = (b.authorized.includes(myID) || b.authorized === "ALL" || isAdmin);
                const waLink = `https://wa.me/${b.whatsapp}?text=Hello,%20I%20want%20to%20buy%20${encodeURIComponent(b.title)}.%20My%20ID:%20${myID}`;
                return `<div class="book-card">
                    <strong>${b.title}</strong><br><small style="color:#28a745">Price: ₹${b.price}</small>
                    ${hasAccess ? `<button class="btn-view" onclick="openViewer('${b.link}')">📖 Open Book</button>` : `
                        <button class="btn-view btn-locked" onclick="alert('Buy to unlock this book! Your ID: ${myID}')">🔒 Locked</button>
                        ${b.whatsapp ? `<a href="${waLink}" target="_blank" class="btn-wa">💬 Chat with Seller</a>` : ''}
                    `}
                    ${isAdmin ? `<div class="admin-btns"><button class="adm-btn" style="background:var(--y)" onclick="editBook('${d.id}','${b.title}','${b.link}','${b.authorized}','${b.price}','${b.whatsapp}')">Edit</button><button class="adm-btn" style="background:var(--r);color:white" onclick="deleteBook('${d.id}')">Delete</button></div>` : ''}
                </div>`;
            }).join('');
        });
    }

    window.unlockFocus = () => { if(document.getElementById('focusPin').value === "1234") { document.getElementById('focusLock').style.display='none'; document.getElementById('focusContent').style.display='block'; } else { alert("Wrong!"); } };
    window.loadRoom = () => { onSnapshot(query(chatCol, where("room", "==", document.getElementById('roomIn').value)), snap => {
        let msgs = snap.docs.map(d => d.data()).sort((a,b) => (a.ts?.seconds||0)-(b.ts?.seconds||0));
        document.getElementById('cBox').innerHTML = msgs.map(m => `<div class="msg ${m.sender === myID ? 'mine' : 'others'}">${m.text}</div>`).join('');
    });};
    window.sendMsg = async () => { await addDoc(chatCol, {room: document.getElementById('roomIn').value, text: document.getElementById('mIn').value, sender: myID, ts: serverTimestamp()}); document.getElementById('mIn').value=""; };
    window.askAI = async () => {
        const i = document.getElementById('aiIn'), b = document.getElementById('aiBox'); b.innerHTML += `<div class="msg mine">${i.value}</div>`;
        const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST", headers: { "Authorization": "Bearer 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", "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"user", content:i.value}] })
        });
        const d = await r.json(); b.innerHTML += `<div class="msg others">${d.choices[0].message.content}</div>`; i.value="";
    };
    let timer;
    window.startT = () => { let s = (parseInt(document.getElementById('tMin').value)||25)*60; clearInterval(timer); timer = setInterval(() => { if(s<=0){clearInterval(timer); alert("Done!"); return;} s--; document.getElementById('tDisp').innerText = Math.floor(s/60)+":"+(s%60).toString().padStart(2,'0'); },1000); };
    window.resetT = () => { clearInterval(timer); document.getElementById('tDisp').innerText="00:00"; };
    window.addT = () => { let g = JSON.parse(localStorage.getItem('goals')||"[]"); g.push({t:document.getElementById('todoIn').value, d:false}); localStorage.setItem('goals', JSON.stringify(g)); loadT(); };
    window.togT = (i) => { let g = JSON.parse(localStorage.getItem('goals')); g[i].d = !g[i].d; localStorage.setItem('goals', JSON.stringify(g)); loadT(); };
    function loadT() { let g = JSON.parse(localStorage.getItem('goals')||"[]"); document.getElementById('tList').innerHTML = g.map((x,i) => `<div class="todo-item" onclick="togT(${i})" style="padding:10px; background:#f9f9f9; margin-top:5px; border-radius:8px; border-left:4px solid #007bff; ${x.d?'text-decoration:line-through;opacity:0.5;':''}">${x.t}</div>`).join(''); }
    window.openViewer = (l) => { document.getElementById('pdfFrame').src = l.replace('/view', '/preview'); document.getElementById('secureViewer').style.display='block'; };
    window.closeViewer = () => { document.getElementById('pdfFrame').src = ""; document.getElementById('secureViewer').style.display='none'; };
    loadBooks(); loadT();
</script>
</body>
</html>
