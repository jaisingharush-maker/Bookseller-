<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aarav Elite | Pro Suite</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  body { background: #f8fafc; font-family: -apple-system, sans-serif; min-height: 100vh; margin: 0; } 
  #app { padding: 16px; padding-bottom: 200px; } 
  .glass { background: white; border-radius: 35px; padding: 25px; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
  .nav-active { color: #6366f1 !important; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .publisher-input { width: 100%; padding: 16px 20px; border-radius: 20px; border: 1px solid #e2e8f0; background: #fff; font-size: 14px; outline: none; }
  .save-btn { background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); color: white; padding: 18px; border-radius: 20px; font-weight: 700; width: 100%; margin-top: 10px; }
  .admin-sub-tab { font-size: 11px; font-weight: 800; padding: 8px 16px; border-radius: 12px; color: #94a3b8; cursor: pointer; }
  .admin-sub-tab.active { background: #6366f1; color: white; }
  #chat-box { height: 380px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 14px; }
  .bot { background: #f1f5f9; align-self: flex-start; }
  .user { background: #6366f1; color: white; align-self: flex-end; }
  .loading-dots:after { content: '...'; animation: dots 1.5s infinite;}
  @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
  nav { z-index: 1000; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); }
  #security-lock { display:none; position:fixed; inset:0; background:white; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
</style>
</head>

<body>

<div id="security-lock">
    <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-4xl mb-6"><i class="fas fa-mobile-alt"></i></div>
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Device Unauthorized</h1>
    <p class="text-slate-500 mb-6">Security block: Account already in use on another device.</p>
    <button onclick="logout()" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold">LOGOUT</button>
</div>

<div id="login-screen" class="fixed inset-0 bg-slate-50 z-[2000] flex items-center justify-center p-6">
  <div class="glass w-full max-w-sm text-center space-y-6">
    <div class="w-20 h-20 bg-indigo-600 rounded-[2.5rem] mx-auto flex items-center justify-center shadow-xl"><i class="fas fa-crown text-white text-3xl"></i></div>
    <h1 class="text-2xl font-black text-slate-900 italic">AARAV ELITE</h1>
    <button onclick="login()" class="w-full bg-white border-2 py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> Sign in with Google
    </button>
  </div>
</div>

<div id="app" class="max-w-md mx-auto space-y-4 hidden">
  <div class="flex justify-between items-center bg-white p-4 rounded-[2rem] shadow-sm border border-slate-50">
    <div class="flex items-center gap-3">
        <div id="user-initial" class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold">A</div>
        <div class="flex flex-col"><p id="user-display" class="font-bold text-slate-800 text-sm italic leading-tight">User</p><span id="expiry-tag" class="text-[9px] text-indigo-500 font-bold">Checking...</span></div>
    </div>
    <button onclick="logout()" class="text-red-500 bg-red-50 p-2 px-4 rounded-xl text-xs font-bold uppercase">Logout</button>
  </div>

  <div id="tab-library" class="tab-content active space-y-4"><div id="bookGrid" class="grid gap-4"></div></div>

  <div id="tab-ai" class="tab-content space-y-4">
    <div class="glass space-y-4">
        <div id="chat-box"><div class="msg bot">Namaste! Main Elite AI Tutor hoon. Kuch puchiye...</div></div>
        <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl border">
            <input id="ai-input" class="bg-transparent flex-1 p-2 outline-none text-sm" placeholder="Ask doubt...">
            <button onclick="askAI()" class="bg-indigo-600 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
  </div>

  <div id="tab-erp" class="tab-content space-y-4">
    <div id="erp-locked" class="glass text-center py-12 hidden border-2 border-dashed">
        <h3 class="text-xl font-bold">🔐 ERP Locked</h3>
        <p id="erp-price-tag" class="text-indigo-600 font-bold my-2"></p>
        <button onclick="buyERP()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-4 shadow-lg uppercase text-xs">Unlock Now on WhatsApp</button>
    </div>
    <div id="erp-unlocked" class="glass text-center py-10 hidden"><button onclick="openERP()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">LAUNCH ERP</button></div>
  </div>

  <div id="tab-admin" class="tab-content space-y-4">
    <div class="flex justify-center gap-2 bg-white p-2 rounded-2xl shadow-sm sticky top-0 z-50">
        <div onclick="showAdminSection('publisher')" id="sub-btn-publisher" class="admin-sub-tab active">PUBLISHER</div>
        <div onclick="showAdminSection('manage')" id="sub-btn-manage" class="admin-sub-tab">MANAGE</div>
        <div onclick="showAdminSection('users')" id="sub-btn-users" class="admin-sub-tab">USERS</div>
    </div>
    <div id="sec-publisher" class="admin-section space-y-6">
        <div class="glass space-y-4">
            <input id="edit-id" type="hidden">
            <input id="book-title" class="publisher-input" placeholder="Book Title">
            <textarea id="book-desc" class="publisher-input h-24" placeholder="Description"></textarea>
            <input id="book-link" class="publisher-input" placeholder="Drive Link">
            <div class="grid grid-cols-2 gap-3"><input id="book-price" class="publisher-input" placeholder="Price"><input id="book-wa" class="publisher-input" placeholder="WA Number"><input id="book-cat" class="publisher-input" placeholder="Category"><input id="book-access" class="publisher-input" placeholder="Access (Email IDs)"></div>
            <button onclick="saveBook()" id="saveBtn" class="save-btn">Save Content</button>
        </div>
        <div class="glass p-6 border-l-4 border-indigo-500 mb-20">
            <input id="admin-erp-link" class="publisher-input mb-2" placeholder="ERP Link">
            <div class="grid grid-cols-2 gap-2 mb-4"><input id="admin-wa-global" class="publisher-input" placeholder="Admin WA"><input id="admin-erp-price" class="publisher-input" placeholder="ERP Price"></div>
            <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black">UPDATE GLOBAL SETTINGS</button>
        </div>
    </div>
    <div id="sec-manage" class="admin-section hidden pb-40"><div id="manageGrid"></div></div>
    <div id="sec-users" class="admin-section hidden pb-40"><div id="adminUserList"></div></div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white/95 border-t flex justify-around p-3 pb-8">
    <button onclick="switchTab('library')" id="btn-library" class="nav-btn flex flex-col items-center gap-1 text-[10px] text-slate-400 nav-active"><i class="fas fa-book-open text-xl"></i><span>LIBRARY</span></button>
    <button onclick="switchTab('ai')" id="btn-ai" class="nav-btn flex flex-col items-center gap-1 text-[10px] text-slate-400"><i class="fas fa-brain text-xl"></i><span>AI TUTOR</span></button>
    <button onclick="switchTab('erp')" id="btn-erp" class="nav-btn flex flex-col items-center gap-1 text-[10px] text-slate-400"><i class="fas fa-wallet text-xl"></i><span>ERP</span></button>
    <button onclick="switchTab('admin')" id="btn-admin" class="nav-btn flex flex-col items-center gap-1 text-[10px] text-slate-400 hidden"><i class="fas fa-user-shield text-xl"></i><span>ADMIN</span></button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, updateDoc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const fbCfg = { apiKey: "AIzaSyCrFbBhfWT6WlYAH_ZmopTfzrf47GEQe1k", authDomain: "book-swap-104b7.firebaseapp.com", projectId: "book-swap-104b7" };
const fbApp = initializeApp(fbCfg);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const prov = new GoogleAuthProvider();

const adminEmail = "mihirjaisingh@gmail.com";

// NEW API KEY UPDATED
const GROQ_KEY = "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";

let appSettings = {};
let currentUserData = {};
const getFingerprint = () => navigator.userAgent + (navigator.hardwareConcurrency || "8") + screen.width;

onAuthStateChanged(auth, async user => {
    if (user) {
        currentUserData = { name: user.displayName, email: user.email };
        const uRef = doc(db, "users", user.uid);
        const uSnap = await getDoc(uRef);
        const deviceID = getFingerprint();
        if (uSnap.exists()) {
            const data = uSnap.data();
            if (data.deviceID && data.deviceID !== deviceID && user.email !== adminEmail) {
                document.getElementById("security-lock").style.display = "flex";
                return;
            }
            if (!data.deviceID) await updateDoc(uRef, { deviceID: deviceID });
        } else {
            await setDoc(uRef, { name: user.displayName, email: user.email, deviceID: deviceID, lastLogin: Timestamp.now() });
        }
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("user-display").textContent = user.displayName;
        document.getElementById("user-initial").textContent = user.displayName[0];
        if(user.email === adminEmail) { document.getElementById("btn-admin").classList.remove("hidden"); loadAdminData(); }
        loadSettings(); checkERPStatus(user.uid); loadBooks(user.email);
    }
});

// AI LOGIC WITH NEW KEY & STABLE MODEL
window.askAI = async () => {
    const input = document.getElementById('ai-input');
    const box = document.getElementById('chat-box');
    const text = input.value.trim();
    if(!text) return;
    box.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";
    const tid = "t-" + Date.now();
    box.innerHTML += `<div id="${tid}" class="msg bot loading-dots italic">AI is thinking...</div>`;
    box.scrollTop = box.scrollHeight;
    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{ role: "user", content: text }],
                temperature: 0.7 
            })
        });
        const data = await res.json();
        document.getElementById(tid).remove();
        if(data.choices) {
            box.innerHTML += `<div class="msg bot shadow-sm">${data.choices[0].message.content}</div>`;
        } else {
            box.innerHTML += `<div class="msg bot">Key limit reached or invalid.</div>`;
        }
    } catch (e) { document.getElementById(tid).innerText = "AI Offline. Check internet."; }
    box.scrollTop = box.scrollHeight;
};

// ADMIN & SHARED LOGIC (All old features preserved)
function loadAdminData() {
    onSnapshot(collection(db, "users"), snap => {
        const list = document.getElementById("adminUserList"); list.innerHTML = "";
        snap.forEach(uDoc => {
            const u = uDoc.data();
            list.innerHTML += `<div class="glass p-4 mb-2">
                <div class="text-[10px]"><b>${u.name}</b><br>${u.email}<br><span class="text-indigo-600 font-bold">Exp: ${u.erpExpiry ? u.erpExpiry.toDate().toLocaleDateString('en-GB') : 'No Access'}</span></div>
                <div class="flex gap-2 mt-2"><button onclick="grantAccess('${uDoc.id}')" class="flex-1 bg-indigo-600 text-white text-[9px] py-2 rounded-lg font-bold">GRANT 28d</button><button onclick="resetDevice('${uDoc.id}')" class="flex-1 bg-slate-900 text-white text-[9px] py-2 rounded-lg font-bold">RESET DEVICE</button></div>
            </div>`;
        });
    });
    onSnapshot(collection(db, "secure_ebooks"), snap => {
        const grid = document.getElementById("manageGrid"); grid.innerHTML = "";
        snap.forEach(d => {
            const b = d.data();
            grid.innerHTML += `<div class="glass p-4 flex justify-between items-center mb-2"><div class="text-xs"><b>${b.title}</b></div><div class="flex gap-2"><button onclick="editBook('${d.id}')" class="text-blue-600 font-bold text-[10px]">EDIT</button><button onclick="deleteBook('${d.id}')" class="text-red-600 font-bold text-[10px]">DEL</button></div></div>`;
        });
    });
}

window.editBook = async (id) => {
    const b = (await getDoc(doc(db, "secure_ebooks", id))).data();
    document.getElementById('edit-id').value = id;
    document.getElementById('book-title').value = b.title;
    document.getElementById('book-desc').value = b.desc;
    document.getElementById('book-link').value = b.link;
    document.getElementById('book-price').value = b.price;
    document.getElementById('book-wa').value = b.wa;
    document.getElementById('book-cat').value = b.cat;
    document.getElementById('book-access').value = b.access;
    showAdminSection('publisher');
    document.getElementById('saveBtn').innerText = "Update Content";
};

window.saveBook = async () => {
    const id = document.getElementById('edit-id').value || Date.now().toString();
    await setDoc(doc(db, "secure_ebooks", id), {
        title: document.getElementById('book-title').value,
        desc: document.getElementById('book-desc').value,
        link: document.getElementById('book-link').value,
        price: document.getElementById('book-price').value,
        wa: document.getElementById('book-wa').value,
        cat: document.getElementById('book-cat').value,
        access: document.getElementById('book-access').value
    }, { merge: true });
    alert("Saved!");
    document.getElementById('edit-id').value = ""; document.getElementById('saveBtn').innerText = "Save Content";
};

window.buyERP = () => {
    const waMsg = encodeURIComponent(`Hello, mera naam ${currentUserData.name} hai (${currentUserData.email}). Mujhe ERP access kharidna hai (₹${appSettings.erpPrice} for 28 Days).`);
    window.open(`https://wa.me/${appSettings.wa}?text=${waMsg}`, '_blank');
};

function loadBooks(email) {
    onSnapshot(collection(db, "secure_ebooks"), snap => {
        const grid = document.getElementById("bookGrid"); grid.innerHTML = "";
        snap.forEach(d => {
            const b = d.data();
            const allowed = (b.access === 'ALL' || (b.access && b.access.split(',').map(e => e.trim()).includes(email)));
            const waMsg = encodeURIComponent(`Hello, mera naam ${currentUserData.name} hai (${currentUserData.email}). Mujhe "${b.title}" kharidni hai.`);
            grid.innerHTML += `<div class="glass">
                <span class="text-[9px] bg-indigo-50 text-indigo-500 px-2 py-1 rounded-lg font-bold">${b.cat}</span>
                <h3 class="font-bold text-slate-800 mt-2">${b.title}</h3>
                <div class="flex gap-2 mt-4">${allowed ? `<button onclick="window.open('${b.link}')" class="flex-1 bg-indigo-600 text-white py-2 rounded-xl text-xs font-bold">READ NOW</button>` : `<button onclick="window.open('https://wa.me/${b.wa}?text=${waMsg}')" class="flex-1 bg-slate-900 text-white py-2 rounded-xl text-xs font-bold">Buy (₹${b.price})</button>`}</div>
            </div>`;
        });
    });
}

async function checkERPStatus(uid) {
    const snap = await getDoc(doc(db, "users", uid));
    const setSnap = await getDoc(doc(db, "settings", "app"));
    const set = setSnap.exists() ? setSnap.data() : {};
    if(snap.exists()){
        const u = snap.data();
        const active = u.erpExpiry && u.erpExpiry.toDate() > new Date();
        document.getElementById(active ? "erp-unlocked" : "erp-locked").classList.remove("hidden");
        document.getElementById(active ? "erp-locked" : "erp-unlocked").classList.add("hidden");
        if(!active) document.getElementById("erp-price-tag").innerText = `Pay ₹${set.erpPrice || '0'} for 28 Days Validity`;
        document.getElementById("expiry-tag").innerText = u.erpExpiry ? "Exp: " + u.erpExpiry.toDate().toLocaleDateString('en-GB') : "No Access";
    }
}

window.grantAccess = async (uid) => { const exp = new Date(); exp.setDate(exp.getDate() + 28); await updateDoc(doc(db, "users", uid), { erpExpiry: Timestamp.fromDate(exp) }); alert("Done!"); };
window.resetDevice = async (uid) => { await updateDoc(doc(db, "users", uid), { deviceID: null }); alert("Reset!"); };
window.saveSettings = async () => { await setDoc(doc(db, "settings", "app"), { erpLink: document.getElementById('admin-erp-link').value, wa: document.getElementById('admin-wa-global').value, erpPrice: document.getElementById('admin-erp-price').value }, { merge: true }); alert("Updated!"); };
async function loadSettings() { const s = await getDoc(doc(db, "settings", "app")); if(s.exists()) { appSettings = s.data(); document.getElementById('admin-erp-link').value = appSettings.erpLink || ""; document.getElementById('admin-wa-global').value = appSettings.wa || ""; document.getElementById('admin-erp-price').value = appSettings.erpPrice || ""; } }
window.deleteBook = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "secure_ebooks", id)); };
window.login = () => signInWithPopup(auth, prov);
window.logout = () => signOut(auth).then(() => location.reload());
window.switchTab = (t) => { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active')); document.getElementById('tab-'+t).classList.add('active'); document.getElementById('btn-'+t).classList.add('nav-active'); };
window.showAdminSection = (sec) => { document.querySelectorAll('.admin-section').forEach(el => el.classList.add('hidden')); document.querySelectorAll('.admin-sub-tab').forEach(el => el.classList.remove('active')); document.getElementById('sec-' + sec).classList.remove('hidden'); document.getElementById('sub-btn-' + sec).classList.add('active'); };
window.openERP = () => window.open(appSettings.erpLink, '_blank');
window.contactAdmin = () => window.open(`https://wa.me/${appSettings.wa}`);
</script>
</body>
</html>
